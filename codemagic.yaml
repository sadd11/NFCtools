# Конфигурация сборки для Codemagic
workflows:
  android-hce-emulator:
    name: Build NFC Emulator APK
    instance_type: mac_mini_m1 # Стандартная бесплатная машина
    max_build_duration: 30
    
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "com.example.nfcemulator"
      java: 17 # Для Gradle 8.2+ нужен Java 17

    triggering:
      events:
        - push
      branches:
        - main
        - master

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Android Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - your_email@example.com # Замени на свою почту, чтобы получить APK туда
        notify:
          success: true
          failure: true
