workflows:
  android-hce-emulator:
    name: Build NFC Emulator APK
    instance_type: mac_mini_m1
    max_build_duration: 30
    
    environment:
      vars:
        PACKAGE_NAME: "com.example.nfcemulator"
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Android Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - your_email@example.com # Не забудь поменять на свою почту!
        notify:
          success: true
          failure: true
